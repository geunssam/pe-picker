<!-- 상단 네비바 (학급 내부에서만 표시) -->
<header id="top-navbar" class="top-navbar" style="display: none">
  <!-- 좌측: 로고 -->
  <div class="navbar-left">
    <img src="assets/logo.png" alt="PEPick Logo" style="height: 32px; margin-right: 8px" />
    <h1 class="navbar-logo">PEPick!</h1>
  </div>

  <!-- 중앙: 탭 메뉴 (데스크톱) -->
  <nav class="navbar-tabs">
    <button data-route="dashboard" class="navbar-tab active">
      <svg
        class="nav-icon"
        viewBox="0 0 20 20"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 10.5 10 4l7 6.5" />
        <path d="M5 9.5V17h4v-4h2v4h4V9.5" />
      </svg>
      <span>홈</span>
    </button>
    <button data-route="tag-game" class="navbar-tab">
      <svg
        class="nav-icon"
        viewBox="0 0 20 20"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="10" cy="7" r="3" />
        <path d="M4 18c0-3 2.5-5.5 6-5.5s6 2.5 6 5.5" />
      </svg>
      <span>술래뽑기</span>
    </button>
    <button data-route="group-manager" class="navbar-tab">
      <svg
        class="nav-icon"
        viewBox="0 0 20 20"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="7" cy="7" r="2.5" />
        <circle cx="13" cy="7" r="2.5" />
        <path d="M2 16.5c0-2.5 2-4.5 5-4.5s5 2 5 4.5" />
        <path d="M12 12c2.5 0 4.5 1.8 4.5 4" />
      </svg>
      <span>모둠뽑기</span>
    </button>
    <button data-route="class-stats" class="navbar-tab">
      <svg
        class="nav-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 3v18h18" />
        <path d="M7 16l4-4 4 4 5-6" />
      </svg>
      <span>학급 통계</span>
    </button>
    <button data-route="settings" class="navbar-tab">
      <svg
        class="nav-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
        />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <span>설정</span>
    </button>
  </nav>

  <!-- 우측: 학급정보 + 프로필 + 햄버거 -->
  <div class="navbar-right">
    <span id="navbar-class-name" class="navbar-class-info">학급명</span>
    <span id="navbar-profile-name" class="navbar-profile-name"></span>
    <img
      id="navbar-profile-img"
      class="navbar-profile"
      src=""
      alt="프로필"
      referrerpolicy="no-referrer"
      style="display: none"
    />
    <!-- 햄버거 메뉴 (모바일 전용 — 드로어 열기 트리거) -->
    <button id="navbar-hamburger" class="navbar-hamburger" aria-label="메뉴">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
  </div>
</header>
