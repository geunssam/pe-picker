<!-- 약관 동의 모달 -->
<div id="consent-modal" class="modal-overlay">
  <div class="modal" style="max-width: 400px">
    <div class="modal-header">
      <div class="modal-title">서비스 이용 동의</div>
    </div>
    <div class="modal-body" style="padding: var(--space-lg)">
      <p
        style="
          font-size: var(--font-size-sm);
          color: var(--text-secondary);
          margin-bottom: var(--space-lg);
          line-height: 1.6;
        "
      >
        PEPick! 서비스를 이용하려면 아래 약관에 동의해 주세요.
      </p>

      <!-- 개정 안내 (v1.1) -->
      <div
        style="
          background: rgba(255, 166, 77, 0.1);
          border-left: 3px solid #ffa64d;
          padding: var(--space-sm) var(--space-md);
          border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
          margin-bottom: var(--space-md);
          font-size: var(--font-size-xs);
          color: var(--text-secondary);
          line-height: 1.5;
        "
      >
        개인정보처리방침 및 이용약관이 2026년 3월 9일자로 개정되었습니다.<br />
        주요 변경: 14세 미만 아동 보호, 교사 의무, 데이터 처리 위탁 상세화
      </div>

      <!-- 전체 동의 -->
      <label
        class="consent-row consent-all"
        style="
          display: flex;
          align-items: center;
          gap: var(--space-sm);
          padding: var(--space-md);
          background: rgba(124, 158, 245, 0.08);
          border-radius: var(--radius-md);
          cursor: pointer;
          margin-bottom: var(--space-md);
          font-weight: 600;
        "
      >
        <input type="checkbox" id="consent-all-check" />
        <span>전체 동의</span>
      </label>

      <!-- 개별 항목 -->
      <div style="display: flex; flex-direction: column; gap: var(--space-sm)">
        <!-- 이용약관 -->
        <div
          class="consent-row"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) var(--space-md);
          "
        >
          <label style="display: flex; align-items: center; gap: var(--space-sm); cursor: pointer">
            <input type="checkbox" id="consent-terms-check" class="consent-required" />
            <span style="font-size: var(--font-size-sm)"
              ><span style="color: var(--color-primary); font-weight: 600">[필수]</span> 이용약관
              동의</span
            >
          </label>
          <a
            href="terms.html"
            target="_blank"
            rel="noopener"
            style="
              font-size: var(--font-size-xs);
              color: var(--text-tertiary);
              text-decoration: underline;
            "
            >보기</a
          >
        </div>

        <!-- 개인정보처리방침 -->
        <div
          class="consent-row"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) var(--space-md);
          "
        >
          <label style="display: flex; align-items: center; gap: var(--space-sm); cursor: pointer">
            <input type="checkbox" id="consent-privacy-check" class="consent-required" />
            <span style="font-size: var(--font-size-sm)"
              ><span style="color: var(--color-primary); font-weight: 600">[필수]</span>
              개인정보처리방침 동의</span
            >
          </label>
          <a
            href="privacy.html"
            target="_blank"
            rel="noopener"
            style="
              font-size: var(--font-size-xs);
              color: var(--text-tertiary);
              text-decoration: underline;
            "
            >보기</a
          >
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="consent-submit-btn" class="btn btn-primary btn-lg" disabled style="width: 100%">
        동의하고 시작하기
      </button>
    </div>
  </div>
</div>
