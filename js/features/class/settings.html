<div id="page-settings" class="page-view">
  <div class="page-header">
    <div>
      <div class="page-title">설정</div>
      <div class="page-subtitle">학급 구성원과 모둠을 관리합니다</div>
    </div>
  </div>

  <!-- 학생 설정 -->
  <div class="section">
    <div
      class="section-title"
      style="display: flex; justify-content: space-between; align-items: center"
    >
      <span
        ><svg
          class="icon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
        </svg>
        학생 설정</span
      >
      <div style="display: flex; gap: var(--space-xs)">
        <button
          class="btn btn-danger btn-sm"
          id="settings-reset-students"
          style="font-size: var(--font-size-sm); padding: var(--space-xs) var(--space-md)"
        >
          학생 초기화
        </button>
        <button
          class="btn btn-primary btn-sm"
          id="settings-add-class"
          style="font-size: var(--font-size-sm); padding: var(--space-xs) var(--space-md)"
        >
          편집
        </button>
      </div>
    </div>
    <div class="glass-card" style="padding: var(--space-lg)">
      <div id="settings-class-list" class="settings-class-list"></div>
    </div>
  </div>

  <!-- 현재 모둠 설정 -->
  <div class="section">
    <div
      class="section-title"
      style="display: flex; justify-content: space-between; align-items: center"
    >
      <span
        ><svg
          class="icon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        모둠 설정</span
      >
      <button
        class="btn btn-primary btn-sm"
        id="settings-edit-team"
        style="font-size: var(--font-size-sm); padding: var(--space-xs) var(--space-md)"
      >
        모둠 편집
      </button>
    </div>
    <div class="glass-card" style="padding: var(--space-lg)">
      <div id="settings-team-list"></div>
    </div>
  </div>

  <!-- 계정 관리 -->
  <div class="section">
    <div class="section-title">
      <svg
        class="icon"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <path d="M12 16v-4M12 8h.01" />
      </svg>
      계정 관리
    </div>
    <div class="glass-card" style="padding: var(--space-lg)">
      <div class="setting-row">
        <div class="setting-label">데이터 초기화</div>
        <button class="btn btn-sm btn-danger" id="settings-reset-data">초기화</button>
      </div>
      <div class="setting-row" style="border-bottom: none">
        <div>
          <div class="setting-label" style="color: var(--color-danger)">회원 탈퇴</div>
          <div style="font-size: var(--font-size-xs); color: var(--text-tertiary); margin-top: 2px">
            계정과 모든 데이터가 영구 삭제됩니다
          </div>
        </div>
        <button class="btn btn-sm btn-danger" id="settings-delete-account">탈퇴하기</button>
      </div>
    </div>
  </div>
</div>
