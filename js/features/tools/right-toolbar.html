<!-- 우측 고정 세로 툴바 (3단계: minimized → collapsed → expanded) -->
<div id="right-toolbar" class="right-toolbar minimized" style="display: none">
  <!-- 네비게이션 (홈 + 주요 페이지) -->
  <div class="toolbar-items toolbar-nav-items">
    <button
      id="toolbar-home-btn"
      class="toolbar-btn toolbar-btn--home toolbar-nav-btn"
      data-route="dashboard"
      aria-label="홈"
    >
      <span class="toolbar-icon toolbar-icon--home">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 12.5 12 4l9 8.5" />
          <path d="M5 11v8h5v-5h4v5h5v-8" />
        </svg>
      </span>
      <span class="toolbar-text">홈</span>
    </button>
    <button
      id="toolbar-tag-game-btn"
      class="toolbar-btn toolbar-btn--nav toolbar-nav-btn"
      data-route="tag-game"
      aria-label="술래뽑기"
    >
      <span class="toolbar-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="10" cy="7" r="3" />
          <path d="M4 18c0-3 2.5-5.5 6-5.5s6 2.5 6 5.5" />
        </svg>
      </span>
      <span class="toolbar-text">술래뽑기</span>
    </button>
    <button
      id="toolbar-group-btn"
      class="toolbar-btn toolbar-btn--nav toolbar-nav-btn"
      data-route="group-manager"
      aria-label="모둠뽑기"
    >
      <span class="toolbar-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="7" cy="7" r="2.5" />
          <circle cx="13" cy="7" r="2.5" />
          <path d="M2 16.5c0-2.5 2-4.5 5-4.5s5 2 5 4.5" />
          <path d="M12 12c2.5 0 4.5 1.8 4.5 4" />
        </svg>
      </span>
      <span class="toolbar-text">모둠뽑기</span>
    </button>
    <button
      id="toolbar-stats-btn"
      class="toolbar-btn toolbar-btn--nav toolbar-nav-btn"
      data-route="class-stats"
      aria-label="학급 통계"
    >
      <span class="toolbar-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 3v18h18" />
          <path d="M7 16l4-4 4 4 5-6" />
        </svg>
      </span>
      <span class="toolbar-text">학급 통계</span>
    </button>
  </div>
  <!-- 구분선 -->
  <div class="toolbar-divider"></div>
  <!-- 계정 버튼 -->
  <div class="toolbar-account-items">
    <button id="toolbar-class-btn" class="toolbar-btn toolbar-btn--class" aria-label="학급 변경">
      <span class="toolbar-icon toolbar-icon--class">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="17 1 21 5 17 9" />
          <line x1="3" y1="5" x2="21" y2="5" />
          <polyline points="7 23 3 19 7 15" />
          <line x1="21" y1="19" x2="3" y2="19" />
        </svg>
      </span>
      <span class="toolbar-text">학급 변경</span>
    </button>
    <button id="toolbar-logout-btn" class="toolbar-btn toolbar-btn--logout" aria-label="로그아웃">
      <span class="toolbar-icon toolbar-icon--logout">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="toolbar-text">로그아웃</span>
    </button>
  </div>
  <!-- 구분선 -->
  <div class="toolbar-divider"></div>
  <!-- 배지 도구 -->
  <div class="toolbar-items">
    <button
      id="toolbar-quick-badge-btn"
      class="toolbar-btn toolbar-btn--badge"
      aria-label="빠른 배지 수여"
    >
      <span class="toolbar-icon toolbar-icon--badge">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
          />
        </svg>
      </span>
      <span class="toolbar-text">배지 수여</span>
    </button>
    <button
      id="toolbar-thermo-btn"
      class="toolbar-btn toolbar-btn--thermo"
      aria-label="학급 온도계"
    >
      <span class="toolbar-icon toolbar-icon--thermo">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
        </svg>
      </span>
      <span class="toolbar-text">온도계</span>
    </button>
  </div>
  <!-- 구분선 -->
  <div class="toolbar-divider"></div>
  <!-- 수업 도구 -->
  <div class="toolbar-items">
    <button id="toolbar-timer-btn" class="toolbar-btn toolbar-btn--timer" aria-label="퀵 타이머">
      <span class="toolbar-icon toolbar-icon--timer">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="13" r="8" />
          <path d="M12 9v4l2 2" />
          <path d="M9 2h6" />
          <path d="M12 2v2" />
        </svg>
      </span>
      <span class="toolbar-text">타이머</span>
    </button>
    <button
      id="toolbar-whistle-btn"
      class="toolbar-btn toolbar-btn--whistle"
      aria-label="만능 휘슬"
    >
      <span class="toolbar-icon toolbar-icon--whistle">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 13a5 5 0 1 0 4-1.5L21 7l-1-2-9 5A5 5 0 0 0 9 13z" />
          <circle cx="8.5" cy="14" r="1.2" />
          <path d="M6 6l1 2" />
          <path d="M9 5l.5 2" />
          <path d="M12 4.5l0 2" />
        </svg>
      </span>
      <span class="toolbar-text">휘슬</span>
    </button>
  </div>
  <!-- 구분선 -->
  <div class="toolbar-divider"></div>
  <!-- 설정 -->
  <div class="toolbar-items">
    <button id="toolbar-settings-btn" class="toolbar-btn toolbar-btn--settings" aria-label="설정">
      <span class="toolbar-icon toolbar-icon--settings">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
          />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </span>
      <span class="toolbar-text">설정</span>
    </button>
  </div>
  <!-- 토글 버튼 -->
  <button id="toolbar-toggle" class="toolbar-toggle" aria-label="툴바 접기/펼치기">
    <span class="toggle-icon">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </span>
    <span class="toggle-text">접기</span>
  </button>
</div>
