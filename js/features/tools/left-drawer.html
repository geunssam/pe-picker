<!-- 좌측 슬라이드 드로어 (모바일 전용) -->
<div id="mobile-drawer-overlay" class="mobile-drawer-overlay"></div>
<nav id="mobile-drawer" class="mobile-drawer">
  <!-- 네비게이션 -->
  <div class="mobile-drawer-nav">
    <button data-route="dashboard" class="mobile-nav-item active">
      <span class="mobile-nav-icon">
        <svg
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 10.5 10 4l7 6.5" />
          <path d="M5 9.5V17h4v-4h2v4h4V9.5" />
        </svg>
      </span>
      홈
    </button>
    <button data-route="tag-game" class="mobile-nav-item">
      <span class="mobile-nav-icon">
        <svg
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="10" cy="7" r="3" />
          <path d="M4 18c0-3 2.5-5.5 6-5.5s6 2.5 6 5.5" />
        </svg>
      </span>
      술래뽑기
    </button>
    <button data-route="group-manager" class="mobile-nav-item">
      <span class="mobile-nav-icon">
        <svg
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="7" cy="7" r="2.5" />
          <circle cx="13" cy="7" r="2.5" />
          <path d="M2 16.5c0-2.5 2-4.5 5-4.5s5 2 5 4.5" />
          <path d="M12 12c2.5 0 4.5 1.8 4.5 4" />
        </svg>
      </span>
      모둠뽑기
    </button>
    <button data-route="class-stats" class="mobile-nav-item">
      <span class="mobile-nav-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 3v18h18" />
          <path d="M7 16l4-4 4 4 5-6" />
        </svg>
      </span>
      학급 통계
    </button>
  </div>

  <!-- 하단: 프로필 카드 -->
  <div class="drawer-profile">
    <img
      id="drawer-profile-img"
      class="drawer-profile-img"
      src=""
      alt="프로필"
      referrerpolicy="no-referrer"
    />
    <div class="drawer-profile-info">
      <span id="drawer-profile-name" class="drawer-profile-name"></span>
      <span id="drawer-class-name" class="drawer-class-name"></span>
    </div>
    <div class="drawer-profile-actions">
      <button id="drawer-settings-btn" class="drawer-action-btn" title="설정">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
          />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
      <button id="drawer-logout-btn" class="drawer-action-btn" title="로그아웃">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </div>
  </div>
</nav>
